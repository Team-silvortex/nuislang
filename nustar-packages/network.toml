manifest_schema = "nustar-manifest-v1"
package_id = "official.network"
domain_family = "network"
frontend = "nustar-network"
entry_crate = "crates/yir-domain-network"
ast_entry = "network.ast.bootstrap.v1"
nir_entry = "network.nir.bootstrap.v1"
yir_lowering_entry = "network.yir.lowering.v1"
part_verify_entry = "network.verify.partial.v1"
ast_surface = ["network.mod-ast.v1", "network.endpoint-ast.v1"]
nir_surface = ["nir.network.surface.v1", "nir.stream.surface.v1"]
yir_lowering = ["yir.network.lowering.v1", "yir.socket-lowering.v1"]
part_verify = ["verify.network.endpoint-shape.v1", "verify.network.flow-control.v1"]
binary_extension = "nustar"
package_layout = "single-envelope"
machine_abi_policy = "exact-match"
abi_profiles = ["network.socket.v1", "network.socket.macos.arm64.v1", "network.socket.macos.x86_64.v1", "network.socket.linux.x86_64.v1", "network.socket.windows.x86_64.v1"]
abi_capabilities = ["network.socket.v1:surface:network.profile.*|op:network.*", "network.socket.macos.arm64.v1:surface:network.profile.*|op:network.*", "network.socket.macos.x86_64.v1:surface:network.profile.*|op:network.*", "network.socket.linux.x86_64.v1:surface:network.profile.*|op:network.*", "network.socket.windows.x86_64.v1:surface:network.profile.*|op:network.*"]
abi_targets = ["network.socket.v1:arch=host|os=host|object=host|calling=host|clang=host|vendor=generic|device=socket-io", "network.socket.macos.arm64.v1:arch=arm64|os=darwin|object=mach-o|calling=aapcs64-darwin|clang=aarch64-apple-darwin|vendor=apple|device=socket-io", "network.socket.macos.x86_64.v1:arch=x86_64|os=darwin|object=mach-o|calling=sysv64|clang=x86_64-apple-darwin|vendor=apple|device=socket-io", "network.socket.linux.x86_64.v1:arch=x86_64|os=linux|object=elf|calling=sysv64|clang=x86_64-unknown-linux-gnu|vendor=posix|device=socket-io", "network.socket.windows.x86_64.v1:arch=x86_64|os=windows|object=coff|calling=win64|clang=x86_64-pc-windows-msvc|vendor=microsoft|device=socket-io"]
implementation_kinds = ["native-stub", "native-dylib", "llvm-bc"]
loader_entry = "nustar.bootstrap.v1"
loader_abi = "nustar-loader-v1"
bridge_lane_policy = "dispatch-lanes.io-bound"
bridge_surface = "host-ffi.bridge.network"
bridge_emission_kind = "sidecar-plan"
bridge_entry = "nuis.network.bridge.dispatch.v1"
bridge_kind = "managed-lifecycle-bridge"
bridge_scheduler_binding = "network-poll-bridge"
backend_stub_kind = "network-host-bridge"
backend_submission_mode = "request-response"
backend_wake_policy = "io-ready"
backend_transport_model = "client-session"
backend_request_shape = "packetized-exchange"
backend_response_shape = "completion-callback"
phase_bind = "socket-bind-or-session-open"
phase_submit = "packet-write-dispatch"
phase_wait = "callback-or-read-ready"
phase_finalize = "response-commit-and-wake"
host_bridge_host_ffi_surface = ["socket", "urlsession"]
host_bridge_handle_family = ["network.request", "network.response"]
host_bridge_phase_order = ["bind", "submit", "wait", "finalize"]
host_bridge_phase_bind_inputs = ["request.packet", "bridge.config", "host.session"]
host_bridge_phase_bind_outputs = ["session.handle", "request.handle"]
host_bridge_phase_submit_inputs = ["session.handle", "request.handle", "request.packet"]
host_bridge_phase_submit_outputs = ["inflight.request", "poll.token"]
host_bridge_phase_wait_inputs = ["poll.token", "callback.slot"]
host_bridge_phase_wait_outputs = ["response.packet", "completion.signal"]
host_bridge_phase_finalize_inputs = ["response.packet", "completion.signal"]
host_bridge_phase_finalize_outputs = ["result.value", "scheduler.wake"]
host_bridge_phase_bind_wake = "bind-ready"
host_bridge_phase_submit_wake = "submit-ready"
host_bridge_phase_wait_wake = "io-ready"
host_bridge_phase_finalize_wake = "result-commit"
host_bridge_plan_begin = true
host_bridge_plan_end = true
clock_domain_id = "network.clock.io.v1"
clock_kind = "io-monotonic"
clock_epoch_kind = "io-epoch"
clock_resolution = "network-poll-step"
clock_bridge_default = "global->io:bridge"
support_surface = ["network.profile.bind-core.v1", "network.profile.connect.v1", "network.profile.accept.v1", "network.profile.send.v1", "network.profile.recv.v1", "network.profile.close.v1", "network.profile.timeout.v1", "network.profile.retry.v1", "network.profile.endpoint-kind.v1", "network.profile.stream-window.v1", "network.profile.transport.v1", "network.profile.protocol.v1"]
support_profile_slots = ["bind_core", "endpoint_kind", "transport_family", "local_port", "remote_port", "connect_timeout_ms", "read_timeout_ms", "write_timeout_ms", "retry_budget", "stream_window", "recv_window", "send_window", "protocol_kind", "protocol_version", "protocol_header_bytes"]
default_lanes = ["network.target_config=control", "network.bind_core=control", "network.endpoint=control", "network.listen=control", "network.connect=control", "network.accept=control", "network.poll=control", "network.close=control", "network.retry=control", "network.send=tx", "network.recv=rx"]
profiles = ["aot"]
resource_families = ["network", "network.stream", "cpu", "data"]
unit_types = ["NetworkUnit", "SocketProgram", "EndpointHandle"]
lowering_targets = ["socket-abi", "socket-abi.socket-io", "urlsession", "urlsession.socket-io", "winsock", "winsock.socket-io"]
ops = ["network.target_config", "network.endpoint", "network.listen", "network.connect", "network.accept", "network.send", "network.recv", "network.close", "network.poll", "network.retry", "network.print"]
