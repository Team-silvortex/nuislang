binary_extension = "nustar"
package_layout = "single-envelope"
machine_abi_policy = "exact-match"
abi_profiles = ["shader.metal.msl2_4", "shader.metal.x86_64.msl2_4", "shader.render.cpu-fallback.v1", "shader.vulkan.spv1_6", "shader.dx12.dxil6_8", "shader.opengl.glsl460"]
