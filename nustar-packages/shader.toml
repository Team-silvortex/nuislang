manifest_schema = "nustar-manifest-v1"
package_id = "official.shader"
domain_family = "shader"
frontend = "nustar-shader"
entry_crate = "crates/yir-domain-shader"
ast_entry = "shader.ast.bootstrap.v1"
nir_entry = "shader.nir.bootstrap.v1"
yir_lowering_entry = "shader.yir.lowering.v1"
part_verify_entry = "shader.verify.partial.v1"
ast_surface = ["shader.mod-ast.v1", "shader.pipeline-ast.v1"]
nir_surface = ["nir.shader.surface.v1", "nir.render.surface.v1"]
yir_lowering = ["yir.shader.lowering.v1", "yir.render-pass.lowering.v1"]
part_verify = ["verify.shader.binding-layout.v1", "verify.shader.render-state.v1"]
binary_extension = "nustar"
package_layout = "single-envelope"
machine_abi_policy = "exact-match"
abi_profiles = ["shader.metal.msl2_4", "shader.render.cpu-fallback.v1", "shader.vulkan.spv1_6", "shader.dx12.dxil6_8", "shader.opengl.glsl460"]
abi_capabilities = ["shader.metal.msl2_4:surface:shader.profile.*|surface:shader.inline.wgsl.v1|op:shader.*", "shader.render.cpu-fallback.v1:surface:shader.profile.*|op:shader.target|op:shader.viewport|op:shader.pipeline|op:shader.begin_pass|op:shader.draw_instanced|op:shader.draw_ball|op:shader.draw_sphere|op:shader.print", "shader.vulkan.spv1_6:surface:shader.profile.*|surface:shader.inline.wgsl.v1|op:shader.*", "shader.dx12.dxil6_8:surface:shader.profile.*|surface:shader.inline.wgsl.v1|op:shader.*", "shader.opengl.glsl460:surface:shader.profile.*|op:shader.*"]
abi_targets = ["shader.metal.msl2_4:arch=arm64|os=darwin|object=mach-o|calling=aapcs64-darwin|clang=aarch64-apple-darwin|backend=metal", "shader.render.cpu-fallback.v1:arch=host|os=host|object=host|calling=host|clang=host|backend=cpu-fallback", "shader.vulkan.spv1_6:arch=x86_64|os=linux|object=elf|calling=sysv64|clang=x86_64-unknown-linux-gnu|backend=vulkan", "shader.dx12.dxil6_8:arch=x86_64|os=windows|object=coff|calling=win64|clang=x86_64-pc-windows-msvc|backend=directx"]
implementation_kinds = ["native-stub", "native-dylib", "llvm-bc"]
loader_entry = "nustar.bootstrap.v1"
loader_abi = "nustar-loader-v1"
support_surface = ["shader.profile.packet.v1", "shader.profile.render.v1", "shader.profile.seed.color.v1", "shader.profile.seed.speed.v1", "shader.profile.seed.radius.v1", "shader.profile.target.v1", "shader.profile.viewport.v1", "shader.profile.pipeline.v1", "shader.profile.draw-budget.v1", "shader.profile.packet-slots.v1", "shader.profile.packet-tag.v1", "shader.profile.material-mode.v1", "shader.profile.pass-kind.v1", "shader.profile.packet-field-count.v1", "shader.inline.wgsl.v1"]
support_profile_slots = ["target", "viewport", "pipeline", "vertex_count", "instance_count", "packet_color_slot", "packet_speed_slot", "packet_radius_slot", "packet_tag", "material_mode", "pass_kind", "packet_field_count"]
default_lanes = ["shader.target=setup", "shader.viewport=setup", "shader.pipeline=setup", "shader.inline_wgsl=setup", "shader.begin_pass=render", "shader.draw_instanced=render"]
profiles = ["aot"]
resource_families = ["shader", "shader.render"]
unit_types = ["Material", "RenderPass", "SpriteShader", "SurfaceShader"]
lowering_targets = ["metal", "vulkan", "directx", "opengl"]
ops = ["shader.const", "shader.const_bool", "shader.const_i32", "shader.const_i64", "shader.const_f32", "shader.const_f64", "shader.add", "shader.mul", "shader.add_i32", "shader.mul_i32", "shader.add_f32", "shader.mul_f32", "shader.add_f64", "shader.mul_f64", "shader.target", "shader.viewport", "shader.pipeline", "shader.inline_wgsl", "shader.pack_ball_state", "shader.begin_pass", "shader.dispatch", "shader.draw_instanced", "shader.draw_ball", "shader.draw_sphere", "shader.uniform", "shader.attachment", "shader.bind_set", "shader.texture2d", "shader.sampler", "shader.sample", "shader.sample_uv", "shader.print"]
