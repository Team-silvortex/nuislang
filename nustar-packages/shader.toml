implementation_kinds = ["native-stub", "native-dylib", "llvm-bc"]
loader_entry = "nustar.bootstrap.v1"
loader_abi = "nustar-loader-v1"
bridge_lane_policy = "dispatch-lanes.render-bound"
bridge_surface = "host-ffi.bridge.hetero"
bridge_emission_kind = "sidecar-plan"
bridge_entry = "nuis.shader.bridge.dispatch.v1"
bridge_kind = "managed-lifecycle-bridge"
bridge_scheduler_binding = "render-submit-bridge"
backend_stub_kind = "shader-dispatch"
backend_submission_mode = "frame-graph-dispatch"
backend_wake_policy = "frame-present"
backend_dispatch_shape = "render-pass"
backend_resource_binding = "pipeline-layout"
backend_completion_model = "frame-fence"
phase_bind = "pipeline-and-resource-bind"
phase_submit = "draw-or-dispatch-encode"
phase_wait = "frame-fence-await"
phase_finalize = "present-or-signal"
host_bridge_host_ffi_surface = ["pipeline", "resource", "fence"]
host_bridge_handle_family = ["shader.pipeline", "shader.dispatch"]
host_bridge_phase_order = ["bind", "submit", "wait", "finalize"]
host_bridge_phase_bind_inputs = ["pipeline.layout", "resource.table", "frame.config"]
host_bridge_phase_bind_outputs = ["bound.pipeline", "dispatch.handle"]
host_bridge_phase_submit_inputs = ["dispatch.handle", "bound.pipeline", "encoder.slot"]
host_bridge_phase_submit_outputs = ["inflight.frame", "frame.fence"]
host_bridge_phase_wait_inputs = ["frame.fence", "present.slot"]
host_bridge_phase_wait_outputs = ["frame.state", "present.signal"]
host_bridge_phase_finalize_inputs = ["frame.state", "present.signal"]
host_bridge_phase_finalize_outputs = ["present.result", "scheduler.wake"]
host_bridge_phase_bind_wake = "bind-ready"
host_bridge_phase_submit_wake = "submit-ready"
host_bridge_phase_wait_wake = "frame-present"
host_bridge_phase_finalize_wake = "present-commit"
host_bridge_plan_begin = true
host_bridge_plan_end = true
clock_domain_id = "shader.clock.frame.v1"
clock_kind = "frame-monotonic"
clock_epoch_kind = "frame-epoch"
clock_resolution = "render-pass-step"
clock_bridge_default = "global->frame:bridge"
support_surface = ["shader.profile.packet.v1", "shader.profile.packet.nova.v1", "shader.profile.render.v1", "shader.profile.draw.v1", "shader.profile.seed.color.v1", "shader.profile.seed.speed.v1", "shader.profile.seed.radius.v1", "shader.profile.target.v1", "shader.profile.viewport.v1", "shader.profile.pipeline.v1", "shader.profile.draw-budget.v1", "shader.profile.packet-slots.v1", "shader.profile.packet-tag.v1", "shader.profile.material-mode.v1", "shader.profile.pass-kind.v1", "shader.profile.packet-field-count.v1", "shader.inline.wgsl.v1"]
support_profile_slots = ["target", "viewport", "pipeline", "vertex_count", "instance_count", "packet_color_slot", "packet_speed_slot", "packet_radius_slot", "slider_color_slot", "slider_speed_slot", "slider_radius_slot", "header_accent_slot", "toggle_live_slot", "focus_slot", "packet_tag", "material_mode", "pass_kind", "packet_field_count"]
default_lanes = ["shader.target_config=setup", "shader.target=setup", "shader.viewport=setup", "shader.pipeline=setup", "shader.inline_wgsl=setup", "shader.begin_pass=render", "shader.draw_instanced=render"]
profiles = ["aot"]
resource_families = ["shader", "shader.render"]
unit_types = ["Material", "RenderPass", "SpriteShader", "SurfaceShader"]
lowering_targets = ["metal", "metal.apple-silicon-gpu", "metal.mac-discrete-or-integrated-gpu", "cpu-fallback", "cpu-fallback.cpu-host", "vulkan", "vulkan.discrete-or-integrated-gpu", "directx", "directx.discrete-or-integrated-gpu", "opengl", "opengl.discrete-or-integrated-gpu"]
ops = ["shader.target_config", "shader.const", "shader.const_bool", "shader.const_i32", "shader.const_i64", "shader.const_f32", "shader.const_f64", "shader.add", "shader.mul", "shader.add_i32", "shader.mul_i32", "shader.add_f32", "shader.mul_f32", "shader.add_f64", "shader.mul_f64", "shader.target", "shader.viewport", "shader.pipeline", "shader.inline_wgsl", "shader.pack_ball_state", "shader.begin_pass", "shader.dispatch", "shader.draw_instanced", "shader.draw_ball", "shader.draw_sphere", "shader.uniform", "shader.attachment", "shader.bind_set", "shader.texture2d", "shader.sampler", "shader.sample", "shader.sample_uv", "shader.print"]
