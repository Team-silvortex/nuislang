layout_schema = "nuis-stdlib-layout-v1"
name = "nuis-standard-library"
default_entry = "core"
modules = ["core", "std", "ns-nova"]

[[module]]
name = "core"
kind = "foundation"
path = "core"
package_id = "nuis.core"
depends_on = []
summary = "Minimal semantics-first foundation for primitive values, source contracts, and long-lived language invariants."

[[module]]
name = "std"
kind = "systems"
path = "std"
package_id = "nuis.std"
depends_on = ["core"]
summary = "Practical systems library layered on top of core."

[[module]]
name = "ns-nova"
kind = "framework"
path = "ns-nova"
package_id = "nuis.ns-nova"
depends_on = ["core", "std"]
summary = "Engine-style native GPU application framework built on nuis heterogeneous execution."

